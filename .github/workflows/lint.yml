name: Lint

# Check-only. Black is enforced locally by pre-commit and by the `gates` job in
# ci.yml, so code reaching CI is already formatted; this fails fast (with a diff)
# if it is not. It deliberately does NOT auto-format and push back to the branch:
# a CI push to a protected `main` (enforce_admins + required checks) is a
# foot-gun, and the auto-fix was redundant with the local + gates enforcement.

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Black
      run: pip install black

    - name: Check formatting (fail with diff if unformatted)
      run: black --check --diff .
